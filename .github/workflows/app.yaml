name: Build and Deploy

# 觸發條件：不同 branch 對應不同環境
on:
  push:
    branches:
      - main              # → alpha 環境
      - release/beta      # → beta 環境
      - release/staging   # → staging 環境
  release:
    types: [published]    # → production 環境（打 tag 時觸發）

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: nginx-sre
  EKS_CLUSTER_NAME: sre-pretest-cluster

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: 拉取程式碼
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: 設定 AWS 憑證
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Step 3: 登入 ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 4: Build Docker image
      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY ./docker

      # Step 5: Tag 並 Push image 到 ECR（使用 commit sha 確保每次唯一）
      - name: Push image to ECR
        run: |
          ECR_URI=${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY
          docker tag $ECR_REPOSITORY:latest $ECR_URI:${{ github.sha }}
          docker tag $ECR_REPOSITORY:latest $ECR_URI:latest
          docker push $ECR_URI:${{ github.sha }}
          docker push $ECR_URI:latest

      # Step 6: 設定 kubectl 連接 EKS
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME

      # Step 7: 安裝 Helm
      - name: Install Helm
        uses: azure/setup-helm@v4

      # Step 8: 根據 branch 或 tag 判斷部署環境
      - name: Set environment
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENV=alpha" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == "refs/heads/release/beta" ]]; then
            echo "ENV=beta" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == "refs/heads/release/staging" ]]; then
            echo "ENV=staging" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "ENV=production" >> $GITHUB_ENV
          fi

      # Step 9: 使用環境專屬 values.yaml 部署到對應 namespace
      - name: Deploy to EKS
        run: |
          ECR_URI=${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY
          helm upgrade --install ${{ env.ENV }} helm/nginx-sre \
            -f envs/${{ env.ENV }}/values.yaml \
            --namespace ${{ env.ENV }} \
            --create-namespace \
            --set image.repository=$ECR_URI \
            --set image.tag=${{ github.sha }}