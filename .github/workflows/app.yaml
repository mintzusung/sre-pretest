name: Build and Deploy

# 觸發條件：push 到 main branch 時觸發
on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: nginx-sre
  EKS_CLUSTER_NAME: sre-pretest-cluster

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: 拉取程式碼
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: 設定 AWS 憑證
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Step 3: 登入 ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 4: Build Docker image
      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY ./docker

      # Step 5: Tag 並 Push image 到 ECR
      - name: Push image to ECR
        run: |
          ECR_URI=${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY
          docker tag $ECR_REPOSITORY:latest $ECR_URI:${{ github.sha }}
          docker tag $ECR_REPOSITORY:latest $ECR_URI:latest
          docker push $ECR_URI:${{ github.sha }}
          docker push $ECR_URI:latest

      # Step 6: 設定 kubectl 連接 EKS
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME

      # Step 7: 安裝 Helm
      - name: Install Helm
        uses: azure/setup-helm@v4

      # Step 8: Deploy 到 EKS
      - name: Deploy to EKS
        run: |
          ECR_URI=${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY
          helm upgrade --install nginx-sre helm/nginx-sre \
            --set image.repository=$ECR_URI \
            --set image.tag=${{ github.sha }}